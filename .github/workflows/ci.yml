name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # JOB 1 — Qualité du code (Lint)
  quality:
    name: Lint & Qualité
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Installer les dépendances backend
        run: cd backend && npm ci

      - name: Vérifier la structure du projet
        run: |
          echo "Vérification de la structure..."
          test -f backend/src/server.js       && echo "✓ server.js"
          test -f backend/src/config/database.js && echo "✓ database.js"
          test -f .env.example                && echo "✓ .env.example"
          test -f .gitignore                  && echo "✓ .gitignore"
          test -f README.md                   && echo "✓ README.md"

      - name: Vérifier que .env n'est PAS commité
        run: |
          if git ls-files | grep -q "^backend/.env$"; then
            echo "ERREUR : le fichier .env est commité !"
            exit 1
          else
            echo ".env correctement ignoré"
          fi

  # JOB 2 — Tests (Node 18, 20, 22)
  test:
    name: Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: quality

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Installer les dépendances
        run: cd backend && npm ci

      - name: Lancer les tests
        run: cd backend && npm test --if-present
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret_pour_ci
          JWT_REFRESH_SECRET: test_refresh_secret_pour_ci

  # JOB 3 — Build de vérification
  build:
    name: Build & Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances frontend
        run: cd frontend && npm ci

      - name: Build React
        run: cd frontend && npm run build
        env:
          CI: false
          REACT_APP_API_URL: http://localhost:5000/api

      - name: Vérifier le build
        run: |
          test -d frontend/build && echo "Build React réussi !"
          ls -lh frontend/build/

      - name: Résumé pipeline
        run: |
          echo ""
          echo "   ════════════════════════════════"
          echo "   Pipeline CI terminé avec succès !"
          echo "   ✓ Qualité vérifiée"
          echo "   ✓ Tests passés (Node 18/20/22)"
          echo "   ✓ Build React OK"
          echo "   ════════════════════════════════"